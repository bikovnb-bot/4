{% extends "base.html" %}
{% block title %}Назначение исполнителя{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Назначение исполнителя</h2>
    <form method="post">
        {% csrf_token %}
        <select name="assigned_to" class="form-select" required>
            <option value="">---------</option>
            {% for ex in executors %}
                <option value="{{ ex.id }}">{{ ex.get_full_name|default:ex.username }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn btn-primary mt-3">Назначить</button>
    </form>
</div>
{% endblock %}

{% extends "energy/base.html" %}
{% block title %}{{ title|default:"Ввод показаний" }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> {{ title|default:"Ввод показаний" }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                    {% endif %}

                    {{ form.as_p }}

                    <div class="d-flex justify-content-between mt-4">
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <a href="{% url 'energy:meter_list' %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
